<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>GitHub Issues Tracker</title>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center px-4">

    <main class="bg-white shadow-xl w-full max-w-md p-6 rounded-lg">

        <!-- Header -->
        <div class="text-center">
            <img class="mx-auto w-16 sm:w-20" src="assets/github-logo.png" alt="github-logo">
            <h1 class="text-2xl sm:text-3xl font-bold mt-2">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] text-sm sm:text-base">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <div class="mt-6">
            <form action="loging" class="space-y-4">

                <div>
                    <label class="font-semibold block mb-1">Username</label>
                    <input id="input-Username" type="text" class="input input-bordered w-full" placeholder="Username">
                </div>

                <div>
                    <label class="font-semibold block mb-1">Password</label>
                    <input id="input-Password" type="password" class="input input-bordered w-full" placeholder="Enter Password">
                </div>

                <button id="loging-Btn" class="btn btn-primary w-full mt-2">Sign in</button>

            </form>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-sm">
            <p>OR</p>
            <p class="text-[#64748B]">Demo Credentials:</p>
            <p class="font-semibold mt-2">Username: admin</p>
            <p class="font-semibold">Password: admin123</p>
        </div>

    </main>

    <script src="loging.js"></script>
</body>
</html>
