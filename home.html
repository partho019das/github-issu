<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <!-- daisyui -->
       <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>
</head>
<body>
   <header>
<div class="navbar bg-base-100 shadow-sm flex justify-between">
   <h1 class="text-2xl font-bold">All Issues</h1>
<div>
    <img class="w-10" src="assets/github-logo.png" alt="">
</div>

 <div class="search flex gap-2">
     <input type="text" placeholder="Search Issues" class="input input-primary" />
     <button class="btn btn-primary w-[100px]">Search</button>
 </div>
</div>
   </header>
        
<main>
 <div class="mt-3 p-3 flex gap-2">
  <div>
      <button id="all" class="btn bg-blue-700 btn-sm relative" onclick="switchTab('all')">
      All
   
    </button>
    <button id="open" class="btn btn-sm relative" onclick="switchTab('open')">
      Open
     
    </button>
    <button id="closed" class="btn btn-sm relative" onclick="switchTab('closed')">
      Close
     </button>
  </div>
  </div>
</main>
<div class="mx-auto bg-white shadow m-3 p-4 flex flex-col items-start">
  <div>
    <h1 id="issueCount" class="text-2xl font-bold flex items-center gap-2">
      <img src="assets/Aperture.png" alt="" class="w-6 h-6"> 0 issues
    </h1>
    <p class="text-[#64748B] mt-1">Track and manage your project issues</p>
  </div>
</div>

<section id="card-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 bg-[#FBFBFB] p-2">

</section>

  

</body>

<script src="home.js"></script>
</html>
