<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <!-- daisyui -->
       <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>
</head>
<body>
   <header>
<div class="navbar bg-base-100 shadow-sm flex justify-between">
   <h1 class="text-2xl font-bold">All Issues</h1>
<div>
    <img class="w-10" src="assets/github-logo.png" alt="">
</div>

 <div class="search flex gap-2">
     <input type="text" placeholder="Search Issues" class="input input-primary" />
     <button class="btn btn-primary w-[100px]">Search</button>
 </div>
</div>
   </header>
        
   <main>
    <div class="mt-3 p-3">
 <button id="all" onclick="switchTab(`all`)" class="btn bg-blue-700 btn-sm">All</button>
 <button id="open" onclick="switchTab(`open`)" class="btn btn-sm">Open</button>
 <button id="close" onclick="switchTab(`close`)" class="btn btn-sm">Close</button>
    </div>
   </main>
                   <!-- card added dainamicly -->
   <section  class="card grid grid-cols-2 bg-[#FBFBFB] gap-2 sm:grid-cols-3 md:grid-cols-4">

           <div id="card-container" class="bg-white p-4 shadow-2xl">
              <h1 class="font-bold text-2xl">Fix navigation menu on mobile <br>devices</h1>
              <p class="text-[#64748B]">The navigation menu doesn't collapse <br> properly on mobile devices...</p>
              <div class="badge bg-[#FECACA] border border-[#EF4444] font-semibold text-[#EF4444] rounded-full">BUG</div>
 <div class="badge bg-[#FDE68A] border border-[#D97706] font-semibold text-[#D97706] rounded-full">HELP WANTED</div>
<hr class="mt-2 w-full">
 <p class="text-[#64748B]">#1
by john_doe</p>
<p class="text-[#64748B]">1/15/2024</p>
           </div>


</body>

<script src="home.js"></script>
</html>
