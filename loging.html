<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">

          <!-- dasyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>GitHub Issues Tracker</title>
</head>
<body class="bg-base-200 min-h-screen">
    <main class="bg-white shadow-10xl w-[40%] mx-auto mt-12 ">
     <div class="">
          <img class="text-center mx-auto" src="assets/github-logo.png" alt="github-logo">
       <h1 class="text-4xl font-bold mx-auto text-center">GitHub Issues Tracker</h1>
       <p class="text-[#64748B] text-center">Sign in to manage your issues</p>
       
     </div>
<div class="mx-auto w-[420px] mt-2">
  <form action="loging">
    
    <label class="font-semibold">Username</label>
    <input id="input-Username" type="email" class="input w-[420px]" placeholder="Username"> <br> <br>

        <label class="font-semibold">Password</label>
    <input id="input-Password" type="email" class="input w-[420px]" placeholder="Enter Password">

  </form>
  <button id="loging-Btn" class="btn btn-action ml-2 btn-primary mt-4 w-[400px]">Sign in</button>
</div>

<div class="text-center"><br>
  <p>OR</p>
  <p class="text-[#64748B]">Demo Credentials:</p> <br>
  <h1 class="font-semibold">Username: admin </h1>
<h1 class="font-semibold">
Password: admin123</h1>
</div>



    </main>

    <script src="loging.js"></script>
</body>
</html>
